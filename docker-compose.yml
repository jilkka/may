services:
  may:
    build: .
    container_name: may
    restart: unless-stopped
    ports:
      - "5050:5050"
    volumes:
      - may_data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=sqlite:////app/data/may.db
      - UPLOAD_FOLDER=/app/data/uploads

volumes:
  may_data:
